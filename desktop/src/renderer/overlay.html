<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0; height: 100%;
    background: transparent; overflow: hidden;
    -webkit-app-region: no-drag;
    font-family: -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
  }
  .wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100%;
  }
  .pill {
    display: flex; align-items: center; gap: 14px;
    height: 52px; padding: 0 22px 0 20px;
    border-radius: 26px;
    background: rgba(255, 255, 255, 0.96);
    border: 0.5px solid rgba(20, 24, 28, 0.10);
    box-shadow:
      0 10px 34px rgba(20, 24, 28, 0.16),
      inset 0 1px 0 rgba(255, 255, 255, 0.75);
    transform: translateY(18px) scale(0.92);
    opacity: 0;
    animation: rise 420ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes rise {
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .pill.leaving { animation: fall 240ms cubic-bezier(0.4, 0, 1, 1) forwards; }
  @keyframes fall {
    to { transform: translateY(14px) scale(0.94); opacity: 0; }
  }

  /* Live waveform */
  .wave { display: flex; align-items: center; gap: 3px; height: 26px; }
  .bar {
    width: 3px; height: 4px; border-radius: 3px;
    background: linear-gradient(180deg, #ff9d4d, #ff6a3d);
    transition: height 90ms cubic-bezier(0.22, 1, 0.36, 1), background 200ms;
    will-change: height;
  }

  .label {
    color: rgba(20, 24, 28, 0.92);
    font-size: 13.5px; font-weight: 650; letter-spacing: 0;
    white-space: nowrap;
  }

  /* Transcribing state: bars become a calm cyan shimmer */
  .pill.busy .bar {
    background: linear-gradient(180deg, #6fd0ff, #3d9bff);
    animation: shimmer 1.1s ease-in-out infinite;
  }
  .pill.busy .bar:nth-child(1) { animation-delay: 0s; }
  .pill.busy .bar:nth-child(2) { animation-delay: 0.08s; }
  .pill.busy .bar:nth-child(3) { animation-delay: 0.16s; }
  .pill.busy .bar:nth-child(4) { animation-delay: 0.24s; }
  .pill.busy .bar:nth-child(5) { animation-delay: 0.32s; }
  .pill.busy .bar:nth-child(6) { animation-delay: 0.40s; }
  .pill.busy .bar:nth-child(7) { animation-delay: 0.48s; }
  .pill.busy .bar:nth-child(8) { animation-delay: 0.56s; }
  .pill.busy .bar:nth-child(9) { animation-delay: 0.64s; }
  .pill.done .bar { background: linear-gradient(180deg, #3ecf8e, #24a56d); }
  .pill.error .bar { background: linear-gradient(180deg, #ff8b72, #f05252); }
  @keyframes shimmer {
    0%, 100% { height: 5px; opacity: 0.5; }
    50% { height: 20px; opacity: 1; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="pill" id="pill">
      <div class="wave" id="wave">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <span class="label" id="label">Listening</span>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
