name: Parayu
options:
  bundleIdPrefix: com.parayu
  deploymentTarget:
    iOS: "16.0"
targets:
  Parayu:
    type: application
    platform: iOS
    sources:
      - path: Parayu.swiftpm/App
      - path: ../desktop/src/assets/models/ggml-small-q5_1.bin
        buildPhase: resources
      - path: ../desktop/vendor/whisper.cpp/src/whisper.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-alloc.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend-meta.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend-dl.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend-reg.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-opt.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-threading.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-quants.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/gguf.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/ggml-cpu.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/ggml-cpu.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/repack.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/hbm.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/quants.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/traits.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/amx/amx.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/amx/mmq.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/binary-ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/unary-ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/vec.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/arch/arm/quants.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/arch/arm/repack.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-common.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-device.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-device.m
        compilerFlags: -fno-objc-arc
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-context.m
        compilerFlags: -fno-objc-arc
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal.metal
      - path: ../desktop/vendor/whisper.cpp/src/coreml/whisper-encoder.mm
      - path: ../desktop/vendor/whisper.cpp/src/coreml/whisper-encoder-impl.m
      - path: ../desktop/vendor/whisper.cpp/src/coreml/whisper-compat.m
      - path: ../desktop/src/assets/models/ggml-small-encoder.mlmodelc
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.parayu.app
      INFOPLIST_FILE: Parayu.swiftpm/App/Info.plist
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: Q4283HG7BT
      CODE_SIGN_ENTITLEMENTS: Parayu.entitlements
      SWIFT_OBJC_BRIDGING_HEADER: Parayu.swiftpm/App/Parayu-Bridging-Header.h
      CLANG_CXX_LANGUAGE_STANDARD: c++17
      GCC_WARN_64_TO_32_BIT_CONVERSION: NO
      GCC_WARN_UNUSED_FUNCTION: NO
      GCC_OPTIMIZATION_LEVEL: 3
      OTHER_CFLAGS:
        - $(inherited)
        - -O3
        - -Wno-shorten-64-to-32
        - -Wno-implicit-int-conversion
        - -Wno-sign-conversion
        - -Wno-conversion
        - -Wno-unused-function
        - -Wno-ambiguous-macro
        - -Wno-unreachable-code
      OTHER_CPLUSPLUSFLAGS:
        - $(inherited)
        - -O3
        - -Wno-shorten-64-to-32
        - -Wno-implicit-int-conversion
        - -Wno-sign-conversion
        - -Wno-conversion
        - -Wno-unused-function
        - -Wno-ambiguous-macro
        - -Wno-unreachable-code
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - ../desktop/vendor/whisper.cpp/include
        - ../desktop/vendor/whisper.cpp/ggml/include
        - ../desktop/vendor/whisper.cpp/ggml/src
        - ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu
        - ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal
      MTL_HEADER_SEARCH_PATHS:
        - $(inherited)
        - ../desktop/vendor/whisper.cpp/ggml/src
        - ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal
      GCC_PREPROCESSOR_DEFINITIONS:
        - $(inherited)
        - _DARWIN_C_SOURCE
        - GGML_USE_CPU
        - GGML_USE_METAL
        - GGML_USE_ACCELERATE
        - ACCELERATE_NEW_LAPACK
        - ACCELERATE_LAPACK_ILP64
        - WHISPER_VERSION=\"1.9.1\"
        - GGML_VERSION=\"0.15.3\"
        - GGML_COMMIT=\"vendored\"
        - WHISPER_USE_COREML
        - WHISPER_COREML_ALLOW_FALLBACK
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: CoreML.framework
      - target: ParayuKeyboard

  ParayuKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: ParayuKeyboard
      - path: Parayu.swiftpm/App/Services/TextProcessor.swift
      - path: Parayu.swiftpm/App/Services/WhisperTranslator.swift
      - path: ../desktop/vendor/whisper.cpp/src/whisper.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-alloc.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend-meta.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend-dl.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-backend-reg.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-opt.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-threading.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-quants.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/gguf.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/ggml-cpu.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/ggml-cpu.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/repack.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/hbm.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/quants.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/traits.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/amx/amx.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/amx/mmq.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/binary-ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/unary-ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/vec.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/arch/arm/quants.c
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu/arch/arm/repack.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-common.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-device.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-device.m
        compilerFlags: -fno-objc-arc
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-context.m
        compilerFlags: -fno-objc-arc
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal-ops.cpp
      - path: ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal/ggml-metal.metal
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.parayu.app.keyboard
      INFOPLIST_FILE: ParayuKeyboard/Info.plist
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: Q4283HG7BT
      CODE_SIGN_ENTITLEMENTS: ParayuKeyboard/ParayuKeyboard.entitlements
      SWIFT_OBJC_BRIDGING_HEADER: ParayuKeyboard/ParayuKeyboard-Bridging-Header.h
      CLANG_CXX_LANGUAGE_STANDARD: c++17
      GCC_WARN_64_TO_32_BIT_CONVERSION: NO
      GCC_WARN_UNUSED_FUNCTION: NO
      GCC_OPTIMIZATION_LEVEL: 3
      OTHER_SWIFT_FLAGS:
        - $(inherited)
        - -D KEYBOARD
      OTHER_CFLAGS:
        - $(inherited)
        - -O3
        - -Wno-shorten-64-to-32
        - -Wno-implicit-int-conversion
        - -Wno-sign-conversion
        - -Wno-conversion
        - -Wno-unused-function
        - -Wno-ambiguous-macro
        - -Wno-unreachable-code
      OTHER_CPLUSPLUSFLAGS:
        - $(inherited)
        - -O3
        - -Wno-shorten-64-to-32
        - -Wno-implicit-int-conversion
        - -Wno-sign-conversion
        - -Wno-conversion
        - -Wno-unused-function
        - -Wno-ambiguous-macro
        - -Wno-unreachable-code
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - ../desktop/vendor/whisper.cpp/include
        - ../desktop/vendor/whisper.cpp/ggml/include
        - ../desktop/vendor/whisper.cpp/ggml/src
        - ../desktop/vendor/whisper.cpp/ggml/src/ggml-cpu
        - ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal
      MTL_HEADER_SEARCH_PATHS:
        - $(inherited)
        - ../desktop/vendor/whisper.cpp/ggml/src
        - ../desktop/vendor/whisper.cpp/ggml/src/ggml-metal
      GCC_PREPROCESSOR_DEFINITIONS:
        - $(inherited)
        - _DARWIN_C_SOURCE
        - GGML_USE_CPU
        - GGML_USE_METAL
        - GGML_USE_ACCELERATE
        - ACCELERATE_NEW_LAPACK
        - ACCELERATE_LAPACK_ILP64
        - WHISPER_VERSION=\"1.9.1\"
        - GGML_VERSION=\"0.15.3\"
        - GGML_COMMIT=\"vendored\"
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework

schemes:
  Parayu:
    build:
      targets:
        Parayu: all
