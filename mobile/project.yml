name: Parayu
options:
  bundleIdPrefix: com.parayu
  deploymentTarget:
    iOS: "16.0"
targets:
  Parayu:
    type: application
    platform: iOS
    sources:
      - path: Parayu.swiftpm/App
      - path: src/assets/models/ggml-small-q5_1.bin
        buildPhase: resources
      - path: vendor/whisper.cpp/src/whisper.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml.c
      - path: vendor/whisper.cpp/ggml/src/ggml.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-alloc.c
      - path: vendor/whisper.cpp/ggml/src/ggml-backend.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-backend-meta.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-backend-dl.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-backend-reg.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-opt.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-threading.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-quants.c
      - path: vendor/whisper.cpp/ggml/src/gguf.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/ggml-cpu.c
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/ggml-cpu.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/repack.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/hbm.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/quants.c
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/traits.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/amx/amx.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/amx/mmq.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/binary-ops.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/unary-ops.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/vec.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/ops.cpp
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/arch/arm/quants.c
      - path: vendor/whisper.cpp/ggml/src/ggml-cpu/arch/arm/repack.cpp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.parayu.app
      INFOPLIST_FILE: Parayu.swiftpm/App/Info.plist
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_ENTITLEMENTS: Parayu.entitlements
      SWIFT_OBJC_BRIDGING_HEADER: Parayu.swiftpm/App/Parayu-Bridging-Header.h
      CLANG_CXX_LANGUAGE_STANDARD: c++17
      GCC_WARN_64_TO_32_BIT_CONVERSION: NO
      GCC_WARN_UNUSED_FUNCTION: NO
      GCC_OPTIMIZATION_LEVEL: 3
      OTHER_CFLAGS:
        - $(inherited)
        - -O3
        - -Wno-shorten-64-to-32
        - -Wno-implicit-int-conversion
        - -Wno-sign-conversion
        - -Wno-conversion
        - -Wno-unused-function
        - -Wno-ambiguous-macro
        - -Wno-unreachable-code
      OTHER_CPLUSPLUSFLAGS:
        - $(inherited)
        - -O3
        - -Wno-shorten-64-to-32
        - -Wno-implicit-int-conversion
        - -Wno-sign-conversion
        - -Wno-conversion
        - -Wno-unused-function
        - -Wno-ambiguous-macro
        - -Wno-unreachable-code
      HEADER_SEARCH_PATHS:
        - $(inherited)
        - vendor/whisper.cpp/include
        - vendor/whisper.cpp/ggml/include
        - vendor/whisper.cpp/ggml/src
        - vendor/whisper.cpp/ggml/src/ggml-cpu
      GCC_PREPROCESSOR_DEFINITIONS:
        - $(inherited)
        - _DARWIN_C_SOURCE
        - GGML_USE_CPU
        - GGML_USE_ACCELERATE
        - ACCELERATE_NEW_LAPACK
        - ACCELERATE_LAPACK_ILP64
        - WHISPER_VERSION=\"1.9.1\"
        - GGML_VERSION=\"0.15.3\"
        - GGML_COMMIT=\"vendored\"
    dependencies:
      - sdk: Accelerate.framework
      - target: ParayuKeyboard

  ParayuKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: ParayuKeyboard
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.parayu.app.keyboard
      INFOPLIST_FILE: ParayuKeyboard/Info.plist
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_ENTITLEMENTS: ParayuKeyboard/ParayuKeyboard.entitlements
